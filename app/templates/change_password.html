<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alterar Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      color: #1a1a2e;
    }
    nav.topbar {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar-brand { font-weight: 700; font-size: 0.95rem; color: #1a1a2e; text-decoration: none; }
    .topbar-right { display: flex; align-items: center; gap: 20px; }
    .topbar-email { font-size: 0.85rem; color: #888; }
    .topbar-link { font-size: 0.85rem; color: #2d6df6; text-decoration: none; }
    .topbar-link:hover { text-decoration: underline; }
    .topbar-logout { font-size: 0.85rem; color: #888; text-decoration: none; }
    .topbar-logout:hover { color: #c0392b; }
    .page { max-width: 440px; margin: 0 auto; padding: 40px 20px; }
    .back { color: #888; text-decoration: none; font-size: 0.875rem; display: inline-block; margin-bottom: 20px; }
    .back:hover { color: #444; }
    h1 { font-size: 1.5rem; margin: 0 0 24px; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 28px 28px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 16px; }
    .field label { font-size: 0.78rem; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .04em; }
    .field input {
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #222;
    }
    .field input:focus { outline: none; border-color: #2d6df6; box-shadow: 0 0 0 3px rgba(45,109,246,.1); }
    .btn {
      width: 100%;
      background: #2d6df6;
      color: white;
      border: none;
      padding: 11px;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #1a56d6; }
    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 0.875rem;
      margin-bottom: 18px;
    }
    .alert-error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; }
    .alert-success { background: #f0fff4; color: #1e8449; border: 1px solid #b7e4c7; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-brand">Finanças Pessoais</a>
    <div class="topbar-right">
      <span class="topbar-email">{{ current_user.email }}</span>
      {% if current_user.role == 'admin' %}
      <a href="/users" class="topbar-link">Utilizadores</a>
      <a href="/categories" class="topbar-link">Categorias</a>
      {% endif %}
      <a href="/logout" class="topbar-logout">Sair</a>
    </div>
  </nav>

  <div class="page">
    <a href="/" class="back">← Voltar</a>
    <h1>Alterar Password</h1>

    <div class="card">
      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="alert alert-success">{{ success }}</div>
      {% endif %}

      <form method="post">
        <div class="field">
          <label>Password atual</label>
          <input type="password" name="current_password" required autofocus>
        </div>
        <div class="field">
          <label>Nova password</label>
          <input type="password" name="new_password" required minlength="8">
        </div>
        <div class="field">
          <label>Confirmar nova password</label>
          <input type="password" name="confirm_password" required minlength="8">
        </div>
        <button type="submit" class="btn">Guardar nova password</button>
      </form>
    </div>
  </div>
</body>
</html>
